version: '3.8'

services:
  web:
    build: .
    command: gunicorn "app:create_app()" -w 4 -b 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
      - FLASK_DEBUG=0
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eventdb
      - RATELIMIT_STORAGE_URL=redis://redis:6379/0
      - FILE_STORAGE_PATH=/data
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - static_data:/data

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventdb
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

volumes:
  db_data:
  static_data:
