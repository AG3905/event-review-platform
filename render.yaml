databases:
  - name: event-review-db
    plan: free
    databaseName: event_reviews
    user: event_user

services:
  - type: web
    name: event-review-platform
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn 'app:create_app()' -w 4 -b 0.0.0.0:$PORT --log-level info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-review-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_APP
        value: run.py
      - key: FLASK_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
